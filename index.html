<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="HTML Apps">
    <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23007aff'/%3E%3Ctext x='50%25' y='50%25' font-size='50' fill='white' text-anchor='middle' dominant-baseline='central'%3EH%3C/text%3E%3C/svg%3E">
    <title>Web App Manager</title>
    <link rel="manifest" href="data:application/json;base64,eyJuYW1lIjoiSFRNTCBBcHAgTWFuYWdlciIsInNob3J0X25hbWUiOiJIVE1MIEFwcHMiLCJzdGFydF91cmwiOiIuIiwiZGlzcGxheSI6InN0YW5kYWxvbmUiLCJiYWNrZ3JvdW5kX2NvbG9yIjoiI2YyZjJmNyIsInRoZW1lX2NvbG9yIjoiIzAwN2FmZiIsIm9yaWVudGF0aW9uIjoicG9ydHJhaXQiLCJpY29ucyI6W3sic3JjIjoiZGF0YTppbWFnZS9zdmcreG1sLCUzQ3N2ZyB4bWxucz0naHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmcnIHZpZXdCb3g9JzAgMCAxMDAgMTAwJyUzRSUzQ3JlY3Qgd2lkdGg9JzEwMCcgaGVpZ2h0PScxMDAnIGZpbGw9JyUyMzAwN2FmZicvJTNFJTNDdGV4dCB4PSc1MCUyNScgeT0nNTAlMjUnIGZvbnQtc2l6ZT0nNTAnIGZpbGw9J3doaXRlJyUzRUglM0MvdGV4dCUzRSUzQy9zdmclM0UiLCJzaXplcyI6IjUxMng1MTIiLCJ0eXBlIjoiaW1hZ2Uvc3ZnK3htbCJ9XX0=">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/theme/monokai.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/theme/eclipse.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/addon/fold/foldgutter.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/addon/dialog/dialog.css">
    <style>
        :root {
            --bg: #f2f2f7;
            --card-bg: #ffffff;
            --primary: #007aff;
            --danger: #ff3b30;
            --text: #000000;
            --border: #c6c6c8;
            /* Editor Dark (Default) */
            --e-bg: #1e1e1e;
            --e-gutter: #2d2d2d;
            --e-text: #9cdcfe;
            --e-line: #858585;
        }

        .light-theme {
            --e-bg: #ffffff;
            --e-gutter: #f0f0f0;
            --e-text: #267f99;
            --e-line: #afafaf;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            margin: 0; background-color: var(--bg); color: var(--text);
            overflow: hidden; height: 100vh; width: 100vw;
        }

        /* --- UI Components --- */
        header {
            position: sticky; top: 0; background: rgba(255,255,255,0.8);
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            display: flex; justify-content: space-between; align-items: center;
            padding: calc(env(safe-area-inset-top) + 10px) 20px 15px; border-bottom: 1px solid var(--border); z-index: 100;
        }
        h1 { font-size: 18px; margin: 0; }
        .plus-btn { font-size: 24px; color: var(--primary); background: none; border: none; }

        .hidden { display: none !important; }
        .view { height: 100vh; width: 100vw; position: absolute; top: 0; left: 0; background: var(--bg); overflow-y: auto; }
        
        .btn { padding: 8px 14px; border-radius: 8px; border: none; font-weight: 600; font-size: 14px; cursor: pointer; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-ghost { background: transparent; color: var(--primary); }

        /* --- App List --- */
        .app-list { list-style: none; padding: 15px; margin: 0; }
        .app-item {
            background: var(--card-bg); border-radius: 12px; margin-bottom: 10px;
            display: flex; justify-content: space-between; align-items: center;
            padding: 16px; box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        .app-info { flex-grow: 1; font-size: 17px; }
        .dots-btn { padding: 5px 10px; font-size: 18px; background: none; border: none; color: #8e8e93; }

        /* --- Menus --- */
        #dropdown, #actionMenu {
            position: fixed; right: 15px; background: rgba(255,255,255,0.95); 
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border-radius: 14px; box-shadow: 0 8px 30px rgba(0,0,0,0.15); width: 200px; z-index: 1000;
        }
        .menu-item { padding: 14px 16px; border-bottom: 0.5px solid #c6c6c8; font-size: 16px; }

        #editorMoreMenu {
            position: fixed; background: rgba(255,255,255,0.95); 
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border-radius: 14px; box-shadow: 0 8px 30px rgba(0,0,0,0.15); width: 200px; z-index: 1000;
        }

        /* --- Pro Editor --- */
        #view-editor { background: var(--e-bg); display: flex; flex-direction: column; overflow: hidden; }
        .editor-header { 
            display: flex; justify-content: space-between; align-items: center;
            padding: calc(env(safe-area-inset-top) + 5px) 15px 10px; background: var(--e-gutter); border-bottom: 1px solid var(--border);
        }
        .editor-container { position: relative; flex-grow: 1; overflow: hidden; }
        
        #editor-codemirror {
            height: 100%; width: 100%;
        }

        #editor-codemirror .CodeMirror {
            height: 100%;
            font-family: Menlo, Monaco, 'Courier New', monospace;
            font-size: 14px;
        }

        .editor-toolbar { background: var(--e-gutter); padding: 8px 15px; display: flex; gap: 8px; border-bottom: 1px solid var(--border); }
        .editor-toolbar .spacer { flex-grow: 1; }

        .search-box {
            display: none; background: var(--e-gutter); padding: 8px 15px;
            border-bottom: 1px solid var(--border); align-items: center; gap: 8px;
        }
        .search-box.active { display: flex; }
        .search-box input {
            flex-grow: 1; padding: 6px 10px; border: 1px solid var(--border);
            border-radius: 6px; font-size: 13px; background: var(--e-bg);
            color: var(--e-text);
        }
        .search-box button {
            padding: 6px 12px; border-radius: 6px; border: none;
            background: #e5e5ea; font-size: 12px; cursor: pointer;
        }

        .CodeMirror-search-match {
            background: yellow;
            border-bottom: 2px solid orange;
        }
        .CodeMirror-search-match-selected {
            background: #ff8c00 !important;
            color: white;
            font-weight: bold;
        }

        /* --- Runner & X Button --- */
        #runner { 
            position: fixed; 
            inset: 0; 
            background: white; 
            z-index: 2000; 
            overflow-y: auto; 
            -webkit-overflow-scrolling: touch;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        }
        iframe { width: 100%; height: 100%; border: none; min-height: 100.1%; }
        
        .close-x {
            position: fixed; 
            bottom: calc(env(safe-area-inset-bottom) + 20px);
            left: 20px;
            width: 30px; height: 30px; border-radius: 50%; /* Smaller size */
            background: rgba(0,0,0,0.4); color: white; /* High contrast for visibility */
            display: flex; align-items: center; justify-content: center;
            font-size: 18px; border: none; z-index: 2100; cursor: move;
            touch-action: none; user-select: none;
        }
    </style>
</head>
<body id="main-body">

<input type="file" id="file-import" class="hidden" accept=".html,.txt" onchange="handleFileSelect(event)">

<div id="view-dashboard" class="view">
    <header>
        <h1>My HTML Apps</h1>
        <button class="plus-btn" onclick="stopEvent(event); toggleElement('dropdown')">+</button>
    </header>
    <div id="dropdown" class="hidden">
        <div class="menu-item" onclick="triggerFileInput()">Import HTML File</div>
        <div class="menu-item" onclick="openEditor()">HTML Editor</div>
    </div>
    <ul id="app-list" class="app-list"></ul>
</div>

<div id="actionMenu" class="hidden">
    <div class="menu-item" onclick="handleAction('edit')">Edit</div>
    <div class="menu-item" onclick="handleAction('rename')">Rename</div>
    <div class="menu-item" onclick="handleAction('export')">Export</div>
    <div class="menu-item" style="color:red" onclick="handleAction('delete')">Delete</div>
</div>

<div id="editorMoreMenu" class="hidden">
    <div class="menu-item" onclick="copyEditorContent()">Copy</div>
    <div class="menu-item" onclick="goToLinePrompt()">Go to Line</div>
    <div class="menu-item" onclick="toggleTheme()">Toggle Theme</div>
    <div class="menu-item" onclick="changeFontSize()">Font Size</div>
</div>

<div id="view-editor" class="view hidden">
    <div class="editor-header">
        <button class="btn-ghost btn" onclick="showView('view-dashboard')">Cancel</button>
        <span id="editor-title" style="color:var(--e-line); font-size:12px">New App</span>
        <button class="btn-primary btn" onclick="saveApp()">Save</button>
    </div>
    <div class="editor-toolbar">
        <button class="btn" style="background:#e5e5ea; font-size:11px" onclick="pasteClipboard()">Paste</button>
        <button class="btn" style="background:#e5e5ea; font-size:11px" onclick="stopEvent(event); toggleEditorMoreMenu(event)">More</button>
        <div class="spacer"></div>
        <button class="btn" style="background:#e5e5ea; font-size:11px" onclick="toggleSearch()">Search</button>
    </div>
    <div class="search-box" id="search-box">
        <input type="text" id="search-input" placeholder="Search..." />
        <button onclick="searchPrev()">↑</button>
        <button onclick="searchNext()">↓</button>
        <button onclick="toggleSearch()">✕</button>
    </div>
    <div class="editor-container">
        <div id="editor-codemirror"></div>
    </div>
</div>

<div id="runner" class="hidden">
    <button class="close-x">×</button>
    <iframe id="runner-frame"></iframe>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/htmlmixed/htmlmixed.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/xml/xml.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/javascript/javascript.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/css/css.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/addon/fold/foldcode.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/addon/fold/foldgutter.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/addon/fold/xml-fold.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/addon/fold/brace-fold.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/addon/fold/comment-fold.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/addon/edit/matchbrackets.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/addon/edit/closetag.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/addon/edit/closebrackets.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/addon/search/searchcursor.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/addon/dialog/dialog.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/addon/search/search.js"></script>

<script>
    let apps = JSON.parse(localStorage.getItem('myHtmlApps') || '[]');
    let currentEditIndex = null;
    let currentContextIndex = null;
    let codeMirrorEditor = null;
    let currentTheme = 'monokai';

    function initCodeMirror() {
        if (codeMirrorEditor) return;
        codeMirrorEditor = CodeMirror(document.getElementById('editor-codemirror'), {
            mode: 'htmlmixed',
            theme: 'monokai',
            lineNumbers: true,
            lineWrapping: true,
            autoCloseTags: true,
            autoCloseBrackets: true,
            matchBrackets: true,
            foldGutter: true,
            gutters: ["CodeMirror-linenumbers", "CodeMirror-foldgutter"],
            indentUnit: 2,
            tabSize: 2,
            indentWithTabs: false
        });
    }

    function getEditorValue() {
        return codeMirrorEditor ? codeMirrorEditor.getValue() : '';
    }

    function setEditorValue(value) {
        if (codeMirrorEditor) {
            codeMirrorEditor.setValue(value);
        }
    }

    function toggleEditorTheme() {
        if (!codeMirrorEditor) return;
        currentTheme = currentTheme === 'monokai' ? 'eclipse' : 'monokai';
        codeMirrorEditor.setOption('theme', currentTheme);
    }

    let searchQuery = '';
    let searchCursor = null;
    let searchMarks = [];
    let currentSearchMark = null;

    function clearSearchHighlights() {
        searchMarks.forEach(mark => mark.clear());
        searchMarks = [];
        currentSearchMark = null;
    }

    function highlightAllMatches(query) {
        if (!codeMirrorEditor || !query) return;
        
        clearSearchHighlights();
        
        const cursor = codeMirrorEditor.getSearchCursor(query);
        while (cursor.findNext()) {
            const mark = codeMirrorEditor.markText(
                cursor.from(), 
                cursor.to(), 
                { className: 'CodeMirror-search-match' }
            );
            searchMarks.push(mark);
        }
    }

    function highlightCurrentMatch(from, to) {
        // Remove previous current match highlighting
        if (currentSearchMark) {
            const range = currentSearchMark.find();
            if (range) {
                currentSearchMark.clear();
                const newMark = codeMirrorEditor.markText(
                    range.from, 
                    range.to, 
                    { className: 'CodeMirror-search-match' }
                );
                const index = searchMarks.indexOf(currentSearchMark);
                if (index !== -1) {
                    searchMarks[index] = newMark;
                }
            }
        }

        // Add current match highlighting
        const matchIndex = searchMarks.findIndex(mark => {
            const range = mark.find();
            return range && range.from.line === from.line && range.from.ch === from.ch;
        });

        if (matchIndex !== -1) {
            const oldMark = searchMarks[matchIndex];
            oldMark.clear();
            const newMark = codeMirrorEditor.markText(
                from, 
                to, 
                { className: 'CodeMirror-search-match CodeMirror-search-match-selected' }
            );
            searchMarks[matchIndex] = newMark;
            currentSearchMark = newMark;
        }
    }

    function toggleSearch() {
        const searchBox = document.getElementById('search-box');
        searchBox.classList.toggle('active');
        if (searchBox.classList.contains('active')) {
            document.getElementById('search-input').focus();
        } else {
            clearSearchHighlights();
            searchQuery = '';
            searchCursor = null;
        }
    }

    function doSearch(reverse) {
        if (!codeMirrorEditor) return;
        const query = document.getElementById('search-input').value;
        if (!query) return;

        if (query !== searchQuery) {
            searchQuery = query;
            searchCursor = null;
            highlightAllMatches(query);
        }

        if (!searchCursor) {
            searchCursor = codeMirrorEditor.getSearchCursor(query, reverse ? codeMirrorEditor.getCursor() : null);
        }

        const found = reverse ? searchCursor.findPrevious() : searchCursor.findNext();
        
        if (found) {
            highlightCurrentMatch(searchCursor.from(), searchCursor.to());
            codeMirrorEditor.setSelection(searchCursor.from(), searchCursor.to());
            codeMirrorEditor.scrollIntoView({from: searchCursor.from(), to: searchCursor.to()}, 100);
        } else {
            searchCursor = codeMirrorEditor.getSearchCursor(query, reverse ? {line: codeMirrorEditor.lastLine(), ch: 0} : {line: 0, ch: 0});
            const wrapped = reverse ? searchCursor.findPrevious() : searchCursor.findNext();
            if (wrapped) {
                highlightCurrentMatch(searchCursor.from(), searchCursor.to());
                codeMirrorEditor.setSelection(searchCursor.from(), searchCursor.to());
                codeMirrorEditor.scrollIntoView({from: searchCursor.from(), to: searchCursor.to()}, 100);
            }
        }
    }

    function searchNext() {
        doSearch(false);
    }

    function searchPrev() {
        doSearch(true);
    }

    document.addEventListener('keydown', function(e) {
        const searchBox = document.getElementById('search-box');
        if (searchBox.classList.contains('active') && e.target.id === 'search-input') {
            if (e.key === 'Enter') {
                e.preventDefault();
                if (e.shiftKey) {
                    searchPrev();
                } else {
                    searchNext();
                }
            } else if (e.key === 'Escape') {
                toggleSearch();
            }
        }
    });

    document.addEventListener('input', function(e) {
        if (e.target.id === 'search-input') {
            const query = e.target.value;
            if (query) {
                searchQuery = query;
                searchCursor = null;
                currentSearchMark = null;
                highlightAllMatches(query);
            } else {
                clearSearchHighlights();
                searchQuery = '';
                searchCursor = null;
            }
        }
    });

    function stopEvent(e) { e.stopPropagation(); }
    
    function closeMenus() {
        document.getElementById('dropdown').classList.add('hidden');
        document.getElementById('actionMenu').classList.add('hidden');
        document.getElementById('editorMoreMenu').classList.add('hidden');
    }

    function showView(viewId) {
        document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
        document.getElementById(viewId).classList.remove('hidden');
        closeMenus();
    }

    function toggleElement(id) {
        const el = document.getElementById(id);
        const isHidden = el.classList.contains('hidden');
        closeMenus();
        if (isHidden) el.classList.remove('hidden');
    }

    function toggleTheme() {
        toggleEditorTheme();
    }

    function toggleEditorMoreMenu(e) {
        const menu = document.getElementById('editorMoreMenu');
        const isHidden = menu.classList.contains('hidden');
        closeMenus();
        if (isHidden) {
            menu.classList.remove('hidden');
            menu.style.top = (e.clientY + 10) + 'px';
            menu.style.left = (e.clientX - 100) + 'px';
        }
    }

    function copyEditorContent() {
        const content = getEditorValue();
        if (navigator.clipboard) {
            navigator.clipboard.writeText(content).then(() => {
                alert('Content copied!');
            }).catch(() => {
                alert('Copy failed. Try selecting text manually.');
            });
        } else {
            alert('Clipboard not supported.');
        }
        closeMenus();
    }

    function goToLinePrompt() {
        const lineNum = prompt('Go to line number:');
        if (lineNum && codeMirrorEditor) {
            const line = parseInt(lineNum) - 1;
            if (line >= 0 && line < codeMirrorEditor.lineCount()) {
                codeMirrorEditor.setCursor({line: line, ch: 0});
                codeMirrorEditor.scrollIntoView({line: line, ch: 0}, 100);
                codeMirrorEditor.focus();
            } else {
                alert('Line number out of range.');
            }
        }
        closeMenus();
    }

    let currentFontSize = 14;
    function changeFontSize() {
        const size = prompt('Font size (px):', currentFontSize);
        if (size && codeMirrorEditor) {
            const fontSize = parseInt(size);
            if (fontSize >= 8 && fontSize <= 32) {
                currentFontSize = fontSize;
                const cmElement = codeMirrorEditor.getWrapperElement();
                cmElement.style.fontSize = fontSize + 'px';
                codeMirrorEditor.refresh();
            } else {
                alert('Font size must be between 8 and 32.');
            }
        }
        closeMenus();
    }

    function triggerFileInput() { document.getElementById('file-import').click(); }

    function handleFileSelect(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            apps.push({ name: file.name.replace(/\.[^/.]+$/, ""), code: e.target.result });
            saveToStorage();
        };
        reader.readAsText(file);
    }

    function renderList() {
        const list = document.getElementById('app-list');
        list.innerHTML = '';
        apps.forEach((app, index) => {
            const li = document.createElement('li');
            li.className = 'app-item';
            li.innerHTML = `<div class="app-info" onclick="runApp(${index})">${app.name}</div>
                            <button class="dots-btn" onclick="stopEvent(event); openActionMenu(event, ${index})">•••</button>`;
            list.appendChild(li);
        });
    }

    function openActionMenu(e, index) {
        currentContextIndex = index;
        const menu = document.getElementById('actionMenu');
        closeMenus();
        menu.classList.remove('hidden');
        menu.style.top = (e.clientY + 15) + 'px';
    }

    function handleAction(type) {
        if (type === 'delete') { if (confirm('Delete?')) { apps.splice(currentContextIndex, 1); saveToStorage(); } }
        else if (type === 'rename') { 
            const n = prompt('New name:', apps[currentContextIndex].name); 
            if (n) { apps[currentContextIndex].name = n; saveToStorage(); } 
        }
        else if (type === 'export') { exportApp(currentContextIndex); }
        else if (type === 'edit') { openEditor(currentContextIndex); }
        closeMenus();
    }

    function openEditor(index = null) {
        currentEditIndex = index;
        const code = index !== null ? apps[index].code : '';
        document.getElementById('editor-title').innerText = index !== null ? apps[index].name : 'New App';
        showView('view-editor');
        setTimeout(() => {
            setEditorValue(code);
            if (codeMirrorEditor) codeMirrorEditor.refresh();
        }, 100);
    }

    async function pasteClipboard() {
        try { 
            const text = await navigator.clipboard.readText();
            setEditorValue(text);
        } catch (err) { alert('Use long-press to paste.'); }
    }

    function saveApp() {
        const code = getEditorValue();
        if (!code) return;
        if (currentEditIndex !== null) { apps[currentEditIndex].code = code; }
        else { 
            const name = prompt('App name:'); 
            if (!name) return;
            apps.push({ name, code });
        }
        saveToStorage();
        showView('view-dashboard');
    }

    function saveToStorage() {
        localStorage.setItem('myHtmlApps', JSON.stringify(apps));
        renderList();
    }

    function runApp(index) {
        document.getElementById('runner').classList.remove('hidden');
        document.getElementById('runner-frame').srcdoc = apps[index].code;
    }

    function closeRunner() {
        document.getElementById('runner').classList.add('hidden');
        document.getElementById('runner-frame').srcdoc = '';
        
        // Reset close button position to bottom left
        const closeBtn = document.querySelector('.close-x');
        closeBtn.style.bottom = 'calc(env(safe-area-inset-bottom) + 20px)';
        closeBtn.style.left = '20px';
        closeBtn.style.top = '';
        localStorage.removeItem('closeButtonPos');
    }

    function exportApp(index) {
        const app = apps[index];
        const blob = new Blob([app.code], { type: 'text/html' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = app.name + '.html';
        a.click();
        URL.revokeObjectURL(url);
    }

    // Draggable close button
    let isDragging = false;
    let dragStartX, dragStartY, buttonStartX, buttonStartY;

    function initDraggableButton() {
        const closeBtn = document.querySelector('.close-x');
        const savedPos = JSON.parse(localStorage.getItem('closeButtonPos') || 'null');
        
        if (savedPos) {
            closeBtn.style.top = savedPos.top;
            closeBtn.style.left = savedPos.left;
        }

        // Touch events
        closeBtn.addEventListener('touchstart', function(e) {
            const touch = e.touches[0];
            dragStartX = touch.clientX;
            dragStartY = touch.clientY;
            buttonStartX = closeBtn.offsetLeft;
            buttonStartY = closeBtn.offsetTop;
            isDragging = false;
        });

        closeBtn.addEventListener('touchmove', function(e) {
            e.preventDefault();
            isDragging = true;
            const touch = e.touches[0];
            const deltaX = touch.clientX - dragStartX;
            const deltaY = touch.clientY - dragStartY;
            closeBtn.style.left = (buttonStartX + deltaX) + 'px';
            closeBtn.style.top = (buttonStartY + deltaY) + 'px';
        });

        closeBtn.addEventListener('touchend', function(e) {
            if (isDragging) {
                e.preventDefault();
                const pos = { top: closeBtn.style.top, left: closeBtn.style.left };
                localStorage.setItem('closeButtonPos', JSON.stringify(pos));
            } else {
                closeRunner();
            }
            isDragging = false;
        });

        // Mouse events for desktop
        closeBtn.addEventListener('mousedown', function(e) {
            e.preventDefault();
            dragStartX = e.clientX;
            dragStartY = e.clientY;
            buttonStartX = closeBtn.offsetLeft;
            buttonStartY = closeBtn.offsetTop;
            isDragging = false;

            function onMouseMove(e) {
                isDragging = true;
                const deltaX = e.clientX - dragStartX;
                const deltaY = e.clientY - dragStartY;
                closeBtn.style.left = (buttonStartX + deltaX) + 'px';
                closeBtn.style.top = (buttonStartY + deltaY) + 'px';
            }

            function onMouseUp(e) {
                document.removeEventListener('mousemove', onMouseMove);
                document.removeEventListener('mouseup', onMouseUp);
                if (isDragging) {
                    const pos = { top: closeBtn.style.top, left: closeBtn.style.left };
                    localStorage.setItem('closeButtonPos', JSON.stringify(pos));
                } else {
                    closeRunner();
                }
                isDragging = false;
            }

            document.addEventListener('mousemove', onMouseMove);
            document.addEventListener('mouseup', onMouseUp);
        });
    }

    document.addEventListener('click', closeMenus);
    
    // Service Worker for offline support
    if ('serviceWorker' in navigator) {
        const swCode = `
const CACHE_NAME = 'html-app-manager-v1';
const urlsToCache = [
  './',
  'https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.css',
  'https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/theme/monokai.min.css',
  'https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/theme/eclipse.min.css',
  'https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/addon/fold/foldgutter.css',
  'https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/addon/dialog/dialog.css',
  'https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.js',
  'https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/htmlmixed/htmlmixed.min.js',
  'https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/xml/xml.min.js',
  'https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/javascript/javascript.min.js',
  'https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/css/css.min.js',
  'https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/addon/fold/foldcode.js',
  'https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/addon/fold/foldgutter.js',
  'https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/addon/fold/xml-fold.js',
  'https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/addon/fold/brace-fold.js',
  'https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/addon/fold/comment-fold.js',
  'https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/addon/edit/matchbrackets.js',
  'https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/addon/edit/closetag.js',
  'https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/addon/edit/closebrackets.js',
  'https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/addon/search/searchcursor.js',
  'https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/addon/dialog/dialog.js',
  'https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/addon/search/search.js'
];

self.addEventListener('install', event => {
  event.waitUntil(
    caches.open(CACHE_NAME)
      .then(cache => {
        return cache.addAll(urlsToCache).catch(err => {
          console.log('Cache addAll error:', err);
          return Promise.resolve();
        });
      })
      .then(() => self.skipWaiting())
  );
});

self.addEventListener('fetch', event => {
  event.respondWith(
    caches.match(event.request)
      .then(response => {
        if (response) {
          return response;
        }
        return fetch(event.request).then(response => {
          if (!response || response.status !== 200 || response.type !== 'basic') {
            return response;
          }
          const responseToCache = response.clone();
          caches.open(CACHE_NAME).then(cache => {
            cache.put(event.request, responseToCache);
          });
          return response;
        }).catch(() => {
          return caches.match('./');
        });
      })
  );
});

self.addEventListener('activate', event => {
  event.waitUntil(
    caches.keys().then(cacheNames => {
      return Promise.all(
        cacheNames.map(cacheName => {
          if (cacheName !== CACHE_NAME) {
            return caches.delete(cacheName);
          }
        })
      );
    }).then(() => self.clients.claim())
  );
});
`;
        const blob = new Blob([swCode], { type: 'application/javascript' });
        const swUrl = URL.createObjectURL(blob);
        
        navigator.serviceWorker.register(swUrl, { scope: './' }).then(registration => {
            console.log('Service Worker registered for offline support');
            // Force update on page load
            registration.update();
        }).catch(err => {
            console.log('Service Worker registration failed:', err);
        });
    }
    
    // Initialize after DOM is ready
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', function() {
            initCodeMirror();
            renderList();
            initDraggableButton();
        });
    } else {
        initCodeMirror();
        renderList();
        initDraggableButton();
    }
</script>
</body>
